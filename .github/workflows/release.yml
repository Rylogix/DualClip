name: Release DualClip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, for example 0.1.1 or v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawVersion = "${{ github.event.inputs.version }}"
          }
          else {
            $rawVersion = "${{ github.ref_name }}"
          }

          $rawVersion = $rawVersion.Trim()

          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw "Release version is required."
          }

          if ($rawVersion.StartsWith('v')) {
            $rawVersion = $rawVersion.Substring(1)
          }

          if ($rawVersion -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\.-]+)?$') {
            throw "Version '$rawVersion' is not a supported semantic version."
          }

          $tag = "v$rawVersion"
          "version=$rawVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=DualClip $tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download FFmpeg for CI packaging
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "ffmpeg"

          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $archivePath
          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractRoot -Force

          $ffmpegExe = Get-ChildItem -Path $extractRoot -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($ffmpegExe)) {
            throw "Failed to locate ffmpeg.exe in the downloaded archive."
          }

          New-Item -ItemType Directory -Path "Tools" -Force | Out-Null
          Copy-Item -LiteralPath $ffmpegExe -Destination "Tools\ffmpeg.exe" -Force

      - name: Build release artifacts
        id: package
        shell: pwsh
        env:
          DUALCLIP_PACKAGE_NAME: ${{ vars.DUALCLIP_PACKAGE_NAME }}
          DUALCLIP_PACKAGE_PUBLISHER: ${{ vars.DUALCLIP_PACKAGE_PUBLISHER }}
          DUALCLIP_PACKAGE_DISPLAYNAME: ${{ vars.DUALCLIP_PACKAGE_DISPLAYNAME }}
          DUALCLIP_PACKAGE_PUBLISHERDISPLAYNAME: ${{ vars.DUALCLIP_PACKAGE_PUBLISHERDISPLAYNAME }}
          DUALCLIP_MSIX_CERT_BASE64: ${{ secrets.DUALCLIP_MSIX_CERT_BASE64 }}
          DUALCLIP_MSIX_CERT_PASSWORD: ${{ secrets.DUALCLIP_MSIX_CERT_PASSWORD }}
        run: |
          .\scripts\Publish-DualClip-GitHubRelease.ps1 -Version "${{ steps.meta.outputs.version }}" -IncludeMsix

          $releaseRoot = Join-Path $PWD "artifacts\github-release\${{ steps.meta.outputs.version }}"
          $portableRoot = Join-Path $releaseRoot "portable"
          $storeRoot = Join-Path $releaseRoot "store-submission"
          $assetPath = Join-Path $portableRoot "DualClip.App-${{ steps.meta.outputs.version }}.exe"
          $storeGuidePath = Join-Path $storeRoot "README.txt"

          if (-not (Test-Path -LiteralPath $assetPath)) {
            throw "Release asset was not created at $assetPath."
          }

          if (-not (Test-Path -LiteralPath $storeGuidePath)) {
            throw "Store submission guide was not created at $storeGuidePath."
          }

          if (-not (Get-ChildItem -Path $storeRoot -Recurse -Include *.msix,*.msixupload -ErrorAction SilentlyContinue)) {
            throw "MSIX release assets were not created under $storeRoot."
          }

          "release_root=$releaseRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "portable_root=$portableRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "store_root=$storeRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "portable_asset=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "store_guide=$storeGuidePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dualclip-${{ steps.meta.outputs.tag }}
          path: ${{ steps.package.outputs.release_root }}
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          PORTABLE_ASSET: ${{ steps.package.outputs.portable_asset }}
          STORE_GUIDE: ${{ steps.package.outputs.store_guide }}
          STORE_ROOT: ${{ steps.package.outputs.store_root }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const releaseName = process.env.RELEASE_NAME;
            const portableAsset = process.env.PORTABLE_ASSET;
            const storeGuide = process.env.STORE_GUIDE;
            const storeRoot = process.env.STORE_ROOT;
            const assetPaths = [];
            if (portableAsset && fs.existsSync(portableAsset)) {
              assetPaths.push(portableAsset);
            }
            if (storeGuide && fs.existsSync(storeGuide)) {
              assetPaths.push(storeGuide);
            }
            if (storeRoot && fs.existsSync(storeRoot)) {
              const packagesRoot = path.join(storeRoot, 'packages');
              if (fs.existsSync(packagesRoot)) {
                for (const architecture of fs.readdirSync(packagesRoot, { withFileTypes: true })) {
                  if (!architecture.isDirectory()) {
                    continue;
                  }

                  const architectureRoot = path.join(packagesRoot, architecture.name);
                  for (const entry of fs.readdirSync(architectureRoot, { withFileTypes: true })) {
                    if (!entry.isFile()) {
                      continue;
                    }

                    if (/\.(msix|msixupload)$/i.test(entry.name)) {
                      assetPaths.push(path.join(architectureRoot, entry.name));
                    }
                  }
                }
              }
            }
            const notesPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'release-notes', `${tag}.md`);
            const hasNotesFile = fs.existsSync(notesPath);
            const customReleaseNotes = hasNotesFile
              ? fs.readFileSync(notesPath, 'utf8').trim()
              : '';

            if (assetPaths.length === 0) {
              throw new Error('No curated release assets were found.');
            }

            let releaseId;

            try {
              const existingRelease = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              releaseId = existingRelease.data.id;

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: releaseId,
                tag_name: tag,
                name: releaseName,
                draft: false,
                prerelease: false,
                body: customReleaseNotes || undefined
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const createReleasePayload = {
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: releaseName,
                draft: false,
                prerelease: false
              };

              if (customReleaseNotes) {
                createReleasePayload.body = customReleaseNotes;
              } else {
                createReleasePayload.generate_release_notes = true;
              }

              const createdRelease = await github.rest.repos.createRelease(createReleasePayload);

              releaseId = createdRelease.data.id;
            }

            const release = (await github.rest.repos.getRelease({
              owner,
              repo,
              release_id: releaseId
            })).data;

            for (const assetPath of assetPaths) {
              const assetName = path.basename(assetPath);
              const existingAsset = release.assets.find(asset => asset.name === assetName);

              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id
                });
              }

              const assetData = fs.readFileSync(assetPath);

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: assetName,
                data: assetData,
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": assetData.length
                }
              });
            }
